services:
  db:
    image: postgres:15-alpine
    container_name: visual_jax_db
    restart: always
    environment:
      POSTGRES_USER: postgres # For dev
      POSTGRES_PASSWORD: password # For dev
      POSTGRES_DB: visual_jax
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d visual_jax"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: visual_jax_backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

volumes:
  pgdata: